services:
  api1:
    image: antonybash/rinha-2026:fd-fast-api
    hostname: api1
    cpuset: "0"
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      RINHA_FD_SOCKET: /sockets/api1.sock
      CANDIDATE_LIMIT: "1500"
      APPROVAL_THRESHOLD: "0.6"
      REFERENCES_PATH: /app/resources/references.idx
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"

  api2:
    image: antonybash/rinha-2026:fd-fast-api
    hostname: api2
    cpuset: "1"
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      RINHA_FD_SOCKET: /sockets/api2.sock
      CANDIDATE_LIMIT: "1500"
      APPROVAL_THRESHOLD: "0.6"
      REFERENCES_PATH: /app/resources/references.idx
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"

  lb:
    image: antonybash/rinha-2026:fd-fast-api
    command: ["/app/rinha-lb"]
    cpuset: "2,3"
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      PORT: "9999"
    volumes:
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"

networks:
  default:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,uid=0,gid=0,mode=0777"