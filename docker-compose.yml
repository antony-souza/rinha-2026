services:
  lb:
    image: antonybash/rinha-2026:rafael-lb-fd-p99
    container_name: detecta-lb
    platform: linux/amd64
    cpuset: "2,3"
    ports:
      - "9999:9999"
    networks:
      - rinha
    volumes:
      - sockets:/sockets
    environment:
      LB_PORT: "9999"
      LB_BACKLOG: "65535"
      LB_ACCEPT_BATCH: "64"
      API_SOCKETS: "/sockets/api1-w0.sock,/sockets/api2-w0.sock"
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    logging:
      driver: none
    ulimits:
      nofile: 65535
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"

  api1:
    image: antonybash/rinha-2026:rafael-api-884bebb
    container_name: detecta-api1
    platform: linux/amd64
    cpuset: "0"
    networks:
      - rinha
    volumes:
      - sockets:/sockets
    environment:
      API_SOCKET_PREFIX: "/sockets/api1"
      API_WORKERS: "1"
      CONN_POOL_CAP: "512"
      API_WARMUP_QUERIES: "4096"
      INDEX_MLOCK: "1"
      INDEX_PATH: "/index/index.bin"
      EPOLL_SPIN_US: "0"
      EPOLL_IDLE_US: "60"
      EPOLL_BUSY_POLL_US: "0"
      EPOLL_BUSY_POLL_BUDGET: "8"
      EPOLL_PREFER_BUSY_POLL: "0"
    logging:
      driver: none
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"

  api2:
    image: antonybash/rinha-2026:rafael-api-884bebb
    container_name: detecta-api2
    platform: linux/amd64
    cpuset: "1"
    network_mode: "none"
    volumes:
      - sockets:/sockets
    environment:
      API_SOCKET_PREFIX: "/sockets/api2"
      API_WORKERS: "1"
      CONN_POOL_CAP: "512"
      API_WARMUP_QUERIES: "4096"
      INDEX_MLOCK: "1"
      INDEX_PATH: "/index/index.bin"
      EPOLL_SPIN_US: "0"
      EPOLL_IDLE_US: "60"
      EPOLL_BUSY_POLL_US: "0"
      EPOLL_BUSY_POLL_BUDGET: "8"
      EPOLL_PREFER_BUSY_POLL: "0"
    logging:
      driver: none
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,uid=0,gid=0,mode=0777"